spring:
  application:
    name: NexDrive

  config:
    import: "optional:file:.env[.properties]"

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-client-secret}
            scope:
              - email
              - profile

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:neondb}?sslmode=${DB_SSLMODE:require}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:neondb_owner}
    password: ${DB_PASS:}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      max-lifetime: 600000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:86400000}
    seed:
      admin-password: ${ADMIN_SEED_PASS}
      user-password: ${USER_SEED_PASS}
    cors:
      allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200}

server:
  port: ${PORT:8080}
  error:
    include-stacktrace: never

logging:
  level:
    br.com.unipaulistana.rentacar: INFO
    org.hibernate.SQL: INFO