spring:
  application:
    name: NexDrive

  config:
    import: "optional:file:.env[.properties]"

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-client-secret}
            scope:
              - email
              - profile

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:neondb}?sslmode=${DB_SSLMODE:require}&connectTimeout=10&socketTimeout=10
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:neondb_owner}
    password: ${DB_PASS:}
    hikari:
      # connection-timeout: Maximum milliseconds to wait for a connection from the pool.
      # Reduced to 10 seconds to fail fast rather than hanging the application startup.
      connection-timeout: 10000
      maximum-pool-size: 10
      max-lifetime: 600000
      # initialization-fail-timeout: Controls whether the pool fails fast during pool initialization.
      # Set to 10 seconds so that if the serverless Neon DB is unreachable or sleeping, the application
      # throws an exception and crashes within 10s. This surfaces the exact connection stacktrace
      # in Render logs, well before Render's 120s port-scan healthcheck times out.
      initialization-fail-timeout: 10000
      # data-source-properties: Propagates driver-specific parameters directly to the PGSimpleDataSource.
      # Sets socket and connection level TCP timeouts to 10 seconds.
      data-source-properties:
        connectTimeout: 10
        socketTimeout: 10

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    # V-16 fix: show-sql disabled — logs full queries including bound parameter values,
    # which can expose CPF, phone numbers and other PII in platform logs.
    show-sql: false
    properties:
      hibernate:
        format_sql: false

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      # V-04 fix: access token lifetime reduced to 15 minutes (900000 ms).
      # Short-lived tokens drastically reduce the impact of stolen tokens.
      # The refresh token (7 days) rotates on each use and is stored in httpOnly cookie.
      expiration: ${JWT_EXPIRATION:900000}
    seed:
      admin-password: ${ADMIN_SEED_PASS}
      user-password: ${USER_SEED_PASS}
    cors:
      allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200}

server:
  port: ${PORT:8080}
  error:
    include-stacktrace: never
    include-message: never   # never send Spring error messages to client

logging:
  level:
    br.com.unipaulistana.rentacar: INFO
    # Keep SQL logging OFF in production (set to DEBUG locally via env override if needed)
    org.hibernate.SQL: WARN
    org.springframework.security: WARN